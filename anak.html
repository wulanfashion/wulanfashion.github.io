<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wulan Fashion - Fashion Anak</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #FDFBF7; 
            margin: 0; 
            color: #4A4A4A;
        }

        /* Navigasi Kembali */
        .back-nav {
            padding: 15px 20px;
            background: #fff;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .back-button {
            text-decoration: none;
            color: #556B8C; /* Warna biru keabuan agar beda sedikit */
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        header { 
            background-color: #E6E8EB; /* Warna abu-abu terang yang maskulin */
            padding: 40px 20px; 
            text-align: center;
            border-bottom: 1px solid #D1D5DB; 
        }

        header h1 { 
            margin: 0; 
            color: #374151; 
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
        }

        header p { font-size: 0.9rem; opacity: 0.8; margin-top: 10px; }

        /* Grid Produk */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .product-card:hover { transform: translateY(-5px); }

        .product-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .info {
            padding: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 110px;
            text-align: center;
        }

        .info h3 { 
            margin: 0; 
            font-size: 0.85rem; 
            font-weight: 600;
            height: 2.4em; 
            overflow: hidden; 
        }

        .price { 
            color: #556B8C; 
            font-weight: bold; 
            font-size: 1rem; 
            margin: 10px 0; 
        }

        .btn-shopee {
            display: block;
            background-color: #ee4d2d;
            color: white !important;
            padding: 10px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8rem;
        }

        footer { padding: 40px; font-size: 0.8rem; color: #999; text-align: center; }

        .wa-float {
            position: fixed; bottom: 20px; right: 20px; background-color: #25d366;
            color: white; width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; text-decoration: none;
            z-index: 10000; box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <nav class="back-nav">
        <a href="index.html" class="back-button">
            <span style="font-size: 1.2rem;">&#8592;</span> Kembali ke Beranda
        </a>
    </nav>

    <header>
        <h1>Fashion Anak</h1>
        <p>Koleksi Busana Anak - Premium dan Nyaman</p>
    </header>

    <div class="gallery">
        <div class="product-card">
            <img src="https://via.placeholder.com/400x400?text=Busana+Anak+1" alt="Busana Anak A">
            <div class="info">
                <h3>Busana Anak Premium</h3>
                <div class="price">Rp 125.000</div>
                <a href="#" class="btn-shopee">Beli di Shopee</a>
            </div>
        </div>

        <div class="product-card">
            <img src="https://via.placeholder.com/400x400?text=Celana+Anak+2" alt="Celana Anak B">
            <div class="info">
                <h3>Celana anak Modern</h3>
                <div class="price">Rp 110.000</div>
                <a href="#" class="btn-shopee">Beli di Shopee</a>
            </div>
        </div>

    </div>

    <footer>
        &copy; 2024 Wulan Fashion. All Rights Reserved.
    </footer>

    <a href="https://wa.me/6282119406478" class="wa-float" target="_blank">WA</a>

</body>
</html>
