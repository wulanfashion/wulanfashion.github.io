<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wulan Fashion Store</title>
    <style>
        /* Gaya Dasar */
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f9f9f9; color: #333; }
        header { background: #ff69b4; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Sistem Grid Produk */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 2 kolom di HP */
            gap: 15px; 
            padding: 15px; 
            max-width: 1200px; 
            margin: auto;
        }

        /* Kartu Produk */
        .product-card { 
            background: #fff; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.05); 
            text-align: center;
            transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); }
        .product-card img { width: 100%; height: 180px; object-fit: cover; }
        .product-info { padding: 10px; }
        .product-info h3 { font-size: 14px; margin: 10px 0; color: #444; }
        .product-info p { font-weight: bold; color: #ff69b4; margin-bottom: 10px; }

        /* Tombol WhatsApp */
        .btn-wa { 
            display: inline-block; 
            background: #25d366; 
            color: white; 
            text-decoration: none; 
            padding: 8px 15px; 
            border-radius: 5px; 
            font-size: 12px;
            font-weight: bold;
        }

        /* Responsif untuk Layar Besar (Tablet/PC) */
        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); } /* 4 kolom */
            .product-card img { height: 250px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Wulan Fashion Store</h1>
    <p>Koleksi Muslimah Terbaru & Elegan</p>
</header>

<div class="product-grid">
    
    <div class="product-card">
        <img src="produk1.jpg" alt="Gamis Cantik">
        <div class="product-info">
            <h3>Gamis Syari Premium</h3>
            <p>Rp 185.000</p>
            <a href="https://wa.me/62812345678?text=Halo%20Wulan%20Fashion,%20saya%20mau%20order%20Gamis%20Syari" class="btn-wa">Pesan via WA</a>
        </div>
    </div>

    <div class="product-card">
        <img src="produk2.jpg" alt="Outer Cantik">
        <div class="product-info">
            <h3>Outer Casual Maroon</h3>
            <p>Rp 125.000</p>
            <a href="https://wa.me/6282119406478?text=Halo%20Wulan%20Fashion,%20saya%20mau%20order%20Outer%20Maroon" class="btn-wa">Pesan via WA</a>
        </div>
    </div>

    </div>

</body>
</html>
